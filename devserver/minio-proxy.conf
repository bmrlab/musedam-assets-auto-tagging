# Local nginx proxy for MinIO with browser-upload CORS.
#
# Usage:
#   nginx -c /Users/jayson/Downloads/Work/6_auto-tag/devserver/minio-proxy.conf
#
# Then set:
#   S3_ENDPOINT_URL=http://localhost:9002
#
# MinIO listens on 127.0.0.1:9000. This proxy listens on localhost:9002 and
# preserves the browser-facing Host header so S3 pre-signed URLs remain valid.

events {
    worker_connections 1024;
}

http {
    client_max_body_size 50M;

    server {
        listen 9002;
        server_name localhost;

        location / {
            # MinIO may already emit CORS headers. Hide them so the browser sees
            # exactly one Access-Control-Allow-Origin value from this proxy.
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Expose-Headers;
            proxy_hide_header Access-Control-Max-Age;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $http_origin;
                add_header 'Access-Control-Allow-Methods' 'GET, PUT, POST, DELETE, HEAD, OPTIONS';
                add_header 'Access-Control-Allow-Headers' '*';
                add_header 'Access-Control-Max-Age' 3600;
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, PUT, POST, DELETE, HEAD, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' '*' always;
            add_header 'Access-Control-Expose-Headers' 'ETag, x-amz-request-id, x-amz-id-2' always;

            proxy_pass http://127.0.0.1:9000;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
